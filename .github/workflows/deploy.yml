name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_FRONT: frontend-repo
  ECR_REPOSITORY_BACK: backend-repo
  ECR_REPOSITORY_EUREKA: eureka-repo
  ECR_REPOSITORY_USUARIOS: usuarios-repo
  ECS_CLUSTER: BomberosCluster
  ECS_SERVICE_FRONT: frontend-service
  ECS_SERVICE_BACK: backend-service
  ECS_TASK_DEFINITION_FRONT: .aws/task-def-frontend.json
  ECS_TASK_DEFINITION_BACK: .aws/task-def-backend.json

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Iniciar sesión en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # --- BUILD Y PUSH DE LAS 4 IMÁGENES ---

    - name: Build, tag, y push Frontend a ECR
      id: build-image-front
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd fron_semestralFS3
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONT:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONT:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONT:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONT:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_FRONT:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build, tag, y push Backend (API Gateway) a ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd Caso_semetral_FS/bomberos/api-gateway
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACK:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACK:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACK:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACK:latest

    - name: Build, tag, y push Eureka a ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd Caso_semetral_FS/bomberos/eureka-server
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_EUREKA:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_EUREKA:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_EUREKA:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_EUREKA:latest

    - name: Build, tag, y push Usuarios a ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd Caso_semetral_FS/bomberos/usuarios
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_USUARIOS:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_USUARIOS:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_USUARIOS:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_USUARIOS:latest

    # --- DESPLIEGUE A ECS ---

    - name: Actualizar Task Definition del Frontend
      id: task-def-front
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION_FRONT }}
        container-name: frontend-container
        image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONT }}:${{ github.sha }}

    - name: Desplegar Frontend en ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-front.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_FRONT }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Actualizar Task Definition del Backend Ecosystem
      id: task-def-back
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION_BACK }}
        container-name: backend-container
        image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACK }}:${{ github.sha }}

    - name: Desplegar Backend Ecosystem en ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-back.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_BACK }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true